<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GLADR Dashboard</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --ink: #111827;
        --muted: #64748b;
        --muted-2: #94a3b8;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --line: #dbe3ef;
        --line-strong: #c7d2e0;
        --accent: #0f766e;
        --accent-2: #2563eb;
        --success: #15803d;
        --success-bg: #ecfdf3;
        --failed: #b42318;
        --failed-bg: #fff1f0;
        --pending: #a16207;
        --pending-bg: #fffbeb;
        --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px),
          var(--bg);
        background-size: 32px 32px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      button,
      select {
        font: inherit;
      }

      button {
        color: inherit;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 24px;
        align-items: end;
        padding: 28px clamp(18px, 4vw, 52px) 18px;
        border-bottom: 1px solid rgba(219, 227, 239, 0.72);
        background: rgba(246, 248, 251, 0.88);
        backdrop-filter: blur(16px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .brand-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }

      .brand-mark {
        display: inline-grid;
        width: 32px;
        height: 32px;
        place-items: center;
        border-radius: var(--radius);
        background: var(--ink);
        color: white;
        font-weight: 800;
      }

      .eyebrow,
      label,
      th,
      .metric-label {
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.8rem);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1;
      }

      .lede {
        max-width: 760px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .tab,
      select,
      .icon-button,
      .stage-button,
      .artifact-button {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .tab,
      .icon-button {
        min-height: 40px;
        padding: 9px 12px;
        cursor: pointer;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          color 160ms ease,
          transform 160ms ease;
      }

      .tab.active,
      .tab:hover,
      .icon-button:hover {
        border-color: var(--ink);
        background: var(--ink);
        color: white;
      }

      main {
        display: grid;
        gap: 18px;
        padding: 22px clamp(18px, 4vw, 52px) 44px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
      }

      .panel-pad {
        padding: clamp(18px, 3vw, 28px);
      }

      .section-header {
        display: flex;
        gap: 18px;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .section-title,
      .visual-title {
        font-size: clamp(1.45rem, 3vw, 2.35rem);
        font-weight: 760;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .subtle {
        color: var(--muted);
        line-height: 1.45;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        min-height: 108px;
        padding: 16px;
      }

      .metric-value {
        margin-top: 10px;
        font-size: clamp(1.75rem, 4vw, 2.75rem);
        font-weight: 820;
        letter-spacing: 0;
      }

      .meta {
        margin-top: 7px;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.38;
      }

      .pipeline-hero {
        overflow: hidden;
        padding: clamp(10px, 2vw, 18px) 0 4px;
      }

      .pipeline-map {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .stage-button {
        position: relative;
        display: grid;
        gap: 12px;
        min-height: 172px;
        padding: 16px;
        text-align: left;
        cursor: pointer;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .stage-button::after {
        position: absolute;
        top: 50%;
        right: -22px;
        z-index: 2;
        width: 32px;
        height: 1px;
        content: "";
        background: var(--line-strong);
      }

      .stage-button:last-child::after {
        display: none;
      }

      .stage-button.active,
      .stage-button:hover {
        border-color: var(--accent-2);
        box-shadow: 0 18px 44px rgba(37, 99, 235, 0.12);
        transform: translateY(-1px);
      }

      .stage-top {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .stage-icon {
        display: inline-grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 50%;
        font-weight: 900;
      }

      .stage-icon.completed {
        background: var(--success-bg);
        color: var(--success);
      }

      .stage-icon.failed {
        background: var(--failed-bg);
        color: var(--failed);
      }

      .stage-icon.pending {
        background: var(--pending-bg);
        color: var(--pending);
      }

      .stage-name {
        font-size: 1.05rem;
        font-weight: 800;
      }

      .status-pill,
      .badge,
      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 3px 8px;
        border-radius: var(--radius);
        font-size: 0.72rem;
        font-weight: 850;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .status-pill.completed,
      .badge {
        background: var(--success-bg);
        color: var(--success);
      }

      .status-pill.failed {
        background: var(--failed-bg);
        color: var(--failed);
      }

      .status-pill.pending,
      .badge.gold {
        background: var(--pending-bg);
        color: var(--pending);
      }

      .stage-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .mini-metric {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-soft);
      }

      .mini-value {
        margin-top: 5px;
        font-size: 1.15rem;
        font-weight: 820;
      }

      .stage-detail {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(340px, 1.1fr);
        gap: 18px;
        margin-top: 18px;
        align-items: start;
      }

      .detail-summary {
        display: grid;
        gap: 14px;
      }

      .detail-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .output-list {
        display: grid;
        gap: 9px;
      }

      .output-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        justify-content: space-between;
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-soft);
      }

      .output-title {
        font-weight: 750;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .control {
        display: grid;
        gap: 7px;
      }

      select {
        width: 100%;
        min-height: 42px;
        padding: 0 12px;
        color: var(--ink);
      }

      .analysis-layout {
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .artifact-list {
        display: grid;
        gap: 9px;
        max-height: 680px;
        overflow: auto;
        padding: 8px;
      }

      .artifact-button {
        width: 100%;
        padding: 13px;
        text-align: left;
        color: var(--ink);
        cursor: pointer;
      }

      .artifact-button.active,
      .artifact-button:hover {
        border-color: var(--accent);
        background: #f0fdfa;
      }

      .artifact-title {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        font-weight: 780;
      }

      .visual-shell {
        display: grid;
        gap: 18px;
      }

      .visual-header {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-soft);
        padding: 14px;
      }

      .card-value {
        margin-top: 8px;
        font-size: clamp(1.65rem, 3vw, 2.5rem);
        font-weight: 820;
        letter-spacing: 0;
      }

      .chart {
        display: grid;
        gap: 10px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: minmax(90px, 180px) minmax(0, 1fr) 62px;
        gap: 12px;
        align-items: center;
      }

      .bar-track {
        height: 16px;
        overflow: hidden;
        border-radius: var(--radius);
        background: #e5edf6;
      }

      .bar-fill {
        width: var(--value);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .histogram {
        display: flex;
        gap: 5px;
        align-items: end;
        min-height: 280px;
        padding: 18px 8px 4px;
        border-bottom: 1px solid var(--line);
      }

      .hist-bin {
        position: relative;
        flex: 1;
        min-width: 8px;
        height: var(--value);
        min-height: 2px;
        border-radius: 6px 6px 0 0;
        background: linear-gradient(180deg, var(--accent-2), var(--accent));
      }

      .hist-bin:hover::after {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        z-index: 3;
        padding: 5px 7px;
        content: attr(data-label);
        transform: translateX(-50%);
        border-radius: var(--radius);
        background: var(--ink);
        color: white;
        font-size: 0.78rem;
        white-space: nowrap;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: var(--radius);
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      td:last-child,
      th:last-child {
        text-align: right;
      }

      pre {
        max-height: 420px;
        overflow: auto;
        padding: 16px;
        border-radius: var(--radius);
        background: #eef3f8;
      }

      .pipeline {
        display: grid;
        gap: 18px;
      }

      .pipeline-row {
        display: grid;
        grid-template-columns: minmax(220px, 0.9fr) 44px minmax(260px, 1.2fr) 44px minmax(260px, 1.2fr);
        gap: 12px;
        align-items: stretch;
      }

      .pipeline-arrow {
        display: grid;
        place-items: center;
        color: var(--accent-2);
        font-size: 1.25rem;
        font-weight: 900;
      }

      .pipeline-column {
        display: grid;
        gap: 10px;
        align-content: start;
        min-height: 118px;
      }

      .node {
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-soft);
      }

      .node.latest {
        border-color: rgba(15, 118, 110, 0.65);
        box-shadow: inset 3px 0 0 var(--accent);
      }

      .empty,
      .error {
        padding: 18px;
        border: 1px dashed var(--line-strong);
        border-radius: var(--radius);
        color: var(--muted);
        line-height: 1.5;
      }

      .error {
        border-color: rgba(180, 35, 24, 0.45);
        color: var(--failed);
        background: var(--failed-bg);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1080px) {
        .stage-detail,
        .analysis-layout,
        .pipeline-row {
          grid-template-columns: 1fr;
        }

        .pipeline-arrow {
          transform: rotate(90deg);
        }
      }

      @media (max-width: 860px) {
        header,
        .summary-grid,
        .pipeline-map,
        .controls,
        .cards {
          grid-template-columns: 1fr;
        }

        header {
          position: static;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .stage-button::after {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="brand-row">
          <span class="brand-mark">G</span>
          <span class="eyebrow">Pipeline Console</span>
        </div>
        <h1>GLADR Dashboard</h1>
        <p class="lede">Pipeline status, data quality, analysis outputs, and visualization artifacts for the current GLADR workspace.</p>
      </div>
      <nav class="toolbar" aria-label="Dashboard sections">
        <button class="tab active" data-tab="overview" type="button">Overview</button>
        <button class="tab" data-tab="analysis" type="button">Analysis</button>
        <button class="tab" data-tab="runs" type="button">Runs</button>
        <button class="tab" id="refresh" type="button">Refresh</button>
      </nav>
    </header>

    <main>
      <section class="pipeline-hero" id="overview-view">
        <div class="section-header">
          <div>
            <div class="eyebrow">Latest Pipeline</div>
            <h2 class="section-title">Stage Health</h2>
            <p class="subtle">Click a stage to inspect its latest output and browse previous versions.</p>
          </div>
          <span class="pill" id="stage-generated">Loading</span>
        </div>
        <div class="pipeline-map" id="stage-map"></div>
        <div class="stage-detail" id="stage-detail"></div>
      </section>

      <section class="summary-grid" id="summary"></section>

      <section class="panel panel-pad hidden" id="analysis-view">
        <div class="controls" aria-label="Analysis filters">
          <div class="control">
            <label for="analysis-select">Analysis</label>
            <select id="analysis-select"></select>
          </div>
          <div class="control">
            <label for="category-filter">Category</label>
            <select id="category-filter"></select>
          </div>
          <div class="control">
            <label for="run-filter">Stats run</label>
            <select id="run-filter"></select>
          </div>
        </div>
      </section>

      <section class="analysis-layout hidden" id="analysis-browser">
        <aside class="panel artifact-list" id="artifact-list"></aside>
        <section class="panel panel-pad visual-shell" id="visual-output"></section>
      </section>

      <section class="panel panel-pad hidden" id="pipeline-view">
        <div class="section-header">
          <div>
            <div class="eyebrow">Versioned Runs</div>
            <h2 class="section-title">Pipeline Lanes</h2>
          </div>
          <span class="pill" id="pipeline-count"></span>
        </div>
        <div class="pipeline" id="pipeline"></div>
      </section>
    </main>

    <script>
      const state = {
        payload: null,
        filtered: [],
        selectedFilename: null,
        selectedStage: "ingestion",
        stageHistoryIndex: 0,
        tab: "overview",
      };

      const els = {
        summary: document.getElementById("summary"),
        overviewView: document.getElementById("overview-view"),
        stageMap: document.getElementById("stage-map"),
        stageDetail: document.getElementById("stage-detail"),
        stageGenerated: document.getElementById("stage-generated"),
        analysisView: document.getElementById("analysis-view"),
        analysisBrowser: document.getElementById("analysis-browser"),
        pipelineView: document.getElementById("pipeline-view"),
        analysisSelect: document.getElementById("analysis-select"),
        categoryFilter: document.getElementById("category-filter"),
        runFilter: document.getElementById("run-filter"),
        artifactList: document.getElementById("artifact-list"),
        visualOutput: document.getElementById("visual-output"),
        pipeline: document.getElementById("pipeline"),
        pipelineCount: document.getElementById("pipeline-count"),
        refresh: document.getElementById("refresh"),
        tabs: Array.from(document.querySelectorAll(".tab[data-tab]")),
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDate(value) {
        if (!value) return "Unknown time";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString([], { dateStyle: "medium", timeStyle: "short" });
      }

      function formatValue(value, format, unit) {
        if (value === null || value === undefined || value === "") return "NA";
        if (format === "int") return `${Math.round(Number(value)).toLocaleString()}${unit ? ` ${unit}` : ""}`;
        if (format === "float1") return `${Number(value).toFixed(1)}${unit ? ` ${unit}` : ""}`;
        return `${value}${unit ? ` ${unit}` : ""}`;
      }

      async function loadDashboard() {
        showLoading();
        try {
          const response = await fetch("/api/dashboard-data", { cache: "no-store" });
          if (!response.ok) throw new Error(`Dashboard API returned ${response.status}`);
          state.payload = await response.json();
          if (!currentStage()) state.selectedStage = state.payload?.stage_summaries?.[0]?.id ?? "ingestion";
          populateFilters();
          applyFilters();
          renderSummary();
          renderStageOverview();
          renderPipeline();
        } catch (error) {
          renderApiError(error);
        }
      }

      function showLoading() {
        els.summary.innerHTML = metricCard("Loading", "...", "Scanning runtime artifacts");
        els.stageMap.innerHTML = '<div class="empty">Loading pipeline state...</div>';
        els.stageDetail.innerHTML = "";
        els.artifactList.innerHTML = '<div class="empty">Loading analysis artifacts...</div>';
        els.visualOutput.innerHTML = '<div class="empty">Waiting for dashboard data...</div>';
      }

      function renderApiError(error) {
        els.summary.innerHTML = "";
        els.stageMap.innerHTML = "";
        els.stageDetail.innerHTML = `
          <div class="error">
            <strong>Dashboard API is not available.</strong><br />
            Start the dynamic dashboard with <code>python main.py dashboard --serve</code>, then open
            <code>http://127.0.0.1:8765</code>. Details: ${escapeHtml(error.message)}
          </div>
        `;
      }

      function populateFilters() {
        const analyses = state.payload?.analyses ?? [];
        const categories = uniqueValues(analyses.map((item) => item.category || "Uncategorized"));
        const runIds = uniqueValues(analyses.map((item) => item.run_id).filter(Boolean));

        els.categoryFilter.innerHTML = option("all", "All categories") + categories.map((value) => option(value, value)).join("");
        els.runFilter.innerHTML = option("all", "All stats runs") + runIds.map((value) => option(value, value)).join("");
      }

      function applyFilters() {
        const analyses = state.payload?.analyses ?? [];
        const category = els.categoryFilter.value;
        const runId = els.runFilter.value;
        state.filtered = analyses.filter((analysis) => {
          const categoryMatches = category === "all" || (analysis.category || "Uncategorized") === category;
          const runMatches = runId === "all" || analysis.run_id === runId;
          return categoryMatches && runMatches;
        });

        if (!state.filtered.some((analysis) => analysis.filename === state.selectedFilename)) {
          state.selectedFilename = state.filtered[0]?.filename ?? null;
        }

        els.analysisSelect.innerHTML = state.filtered.length
          ? state.filtered.map((analysis) => option(analysis.filename, `${analysis.title} | ${analysis.run_id}`)).join("")
          : option("", "No analysis artifacts");
        els.analysisSelect.value = state.selectedFilename ?? "";
        renderArtifactList();
        renderSelectedAnalysis();
      }

      function renderSummary() {
        const summary = state.payload?.summary ?? {};
        const latestIngestion = (state.payload?.ingestion_runs ?? []).find((run) => run.is_latest);
        els.summary.innerHTML = [
          metricCard("Ingestion runs", summary.ingestion_runs ?? 0, "Versioned clean-stage manifests"),
          metricCard("Analysis artifacts", summary.analysis_artifacts ?? 0, "Stats outputs discovered"),
          metricCard("Visualizations", summary.visualizations ?? 0, "Renderable chart contracts"),
          metricCard("Latest cohort", latestIngestion?.total_rows ?? "NA", latestIngestion ? formatDate(latestIngestion.run_datetime) : "No ingestion run"),
        ].join("");
      }

      function renderStageOverview() {
        const stages = state.payload?.stage_summaries ?? [];
        els.stageGenerated.textContent = `Updated ${formatDate(state.payload?.generated_at)}`;
        if (!stages.length) {
          els.stageMap.innerHTML = '<div class="empty">No pipeline stages discovered yet.</div>';
          els.stageDetail.innerHTML = "";
          return;
        }

        els.stageMap.innerHTML = stages.map(renderStageButton).join("");
        renderStageDetail();
      }

      function renderStageButton(stage) {
        const current = stage.current;
        const metrics = current?.metrics ?? [];
        return `
          <button class="stage-button ${stage.id === state.selectedStage ? "active" : ""}" type="button" data-stage-id="${escapeHtml(stage.id)}">
            <div class="stage-top">
              <span class="stage-icon ${escapeHtml(stage.status)}">${stageIcon(stage.status)}</span>
              <span class="status-pill ${escapeHtml(stage.status)}">${escapeHtml(stage.status)}</span>
            </div>
            <div>
              <div class="stage-name">${escapeHtml(stage.label)}</div>
              <div class="meta">${escapeHtml(current?.title ?? "No output yet")}</div>
            </div>
            <div class="stage-metrics">
              ${metrics.slice(0, 3).map((metric) => `
                <div class="mini-metric">
                  <div class="metric-label">${escapeHtml(metric.label)}</div>
                  <div class="mini-value">${escapeHtml(metric.value)}</div>
                </div>
              `).join("")}
            </div>
          </button>
        `;
      }

      function renderStageDetail() {
        const stage = currentStage();
        if (!stage) {
          els.stageDetail.innerHTML = '<div class="empty">Select a pipeline stage.</div>';
          return;
        }

        const history = stage.history ?? [];
        const selected = history[state.stageHistoryIndex] ?? stage.current;
        if (!selected) {
          els.stageDetail.innerHTML = `
            <div class="detail-summary">
              <div>
                <div class="eyebrow">${escapeHtml(stage.label)}</div>
                <h3 class="section-title">No stage output</h3>
                <p class="meta">This stage has not produced a discoverable output.</p>
              </div>
            </div>
            <div class="empty">Status: ${escapeHtml(stage.status)}</div>
          `;
          return;
        }

        const versionLabel = history.length ? `${state.stageHistoryIndex + 1} of ${history.length}` : "Latest";
        els.stageDetail.innerHTML = `
          <div class="panel panel-pad detail-summary">
            <div>
              <div class="eyebrow">${escapeHtml(stage.label)} Detail</div>
              <h3 class="section-title">${escapeHtml(selected.title)}</h3>
              <p class="meta">${escapeHtml(selected.description ?? "")}</p>
            </div>
            <div class="stage-metrics">
              ${(selected.metrics ?? []).map((metric) => `
                <div class="mini-metric">
                  <div class="metric-label">${escapeHtml(metric.label)}</div>
                  <div class="mini-value">${escapeHtml(metric.value)}</div>
                </div>
              `).join("")}
            </div>
            <div class="detail-actions">
              <button class="icon-button" type="button" data-history-step="previous">Previous version</button>
              <button class="icon-button" type="button" data-history-step="next">Next version</button>
              <span class="pill">${escapeHtml(versionLabel)}</span>
              ${selected.is_latest ? '<span class="badge">latest</span>' : ""}
            </div>
            <div class="meta">
              Run ${escapeHtml(selected.run_id ?? "NA")} | ${escapeHtml(formatDate(selected.run_datetime))}
            </div>
          </div>
          <div class="panel panel-pad">
            <div class="section-header">
              <div>
                <div class="eyebrow">Outputs</div>
                <h3 class="section-title">Stage Artifacts</h3>
              </div>
            </div>
            ${renderStageOutputs(selected)}
          </div>
        `;
      }

      function renderStageOutputs(stageItem) {
        const outputs = stageItem.outputs ?? [];
        const files = stageItem.files ?? [];
        if (!outputs.length && !files.length) return '<div class="empty">No output details available.</div>';
        const outputRows = outputs.map((item) => `
          <div class="output-row">
            <div>
              <div class="output-title">${escapeHtml(item.label)}</div>
              <div class="meta">${escapeHtml(item.detail ?? "")}</div>
            </div>
          </div>
        `);
        const fileRows = files.map((filename) => `
          <div class="output-row">
            <div>
              <div class="output-title">${escapeHtml(filename)}</div>
              <div class="meta">Runtime artifact</div>
            </div>
          </div>
        `);
        return `<div class="output-list">${outputRows.concat(fileRows).join("")}</div>`;
      }

      function currentStage() {
        return (state.payload?.stage_summaries ?? []).find((stage) => stage.id === state.selectedStage);
      }

      function stageIcon(status) {
        if (status === "completed") return "✓";
        if (status === "failed") return "×";
        return "!";
      }

      function moveStageHistory(direction) {
        const stage = currentStage();
        const historyLength = stage?.history?.length ?? 0;
        if (historyLength <= 1) return;
        const delta = direction === "next" ? 1 : -1;
        state.stageHistoryIndex = (state.stageHistoryIndex + delta + historyLength) % historyLength;
        renderStageDetail();
      }

      function renderArtifactList() {
        if (!state.filtered.length) {
          els.artifactList.innerHTML = '<div class="empty">No analysis artifacts match the selected filters.</div>';
          return;
        }

        els.artifactList.innerHTML = state.filtered
          .map((analysis) => `
            <button class="artifact-button ${analysis.filename === state.selectedFilename ? "active" : ""}" type="button" data-filename="${escapeHtml(analysis.filename)}">
              <div class="artifact-title">
                <span>${escapeHtml(analysis.title)}</span>
                ${analysis.is_latest ? '<span class="badge">latest</span>' : ""}
              </div>
              <div class="meta">
                ${escapeHtml(analysis.category)} | ${escapeHtml(analysis.visualization_type || "data")} | ${escapeHtml(formatDate(analysis.run_datetime))}
              </div>
            </button>
          `)
          .join("");
      }

      function renderSelectedAnalysis() {
        const analysis = state.filtered.find((item) => item.filename === state.selectedFilename);
        if (!analysis) {
          els.visualOutput.innerHTML = '<div class="empty">Select an analysis artifact to inspect.</div>';
          return;
        }

        els.visualOutput.innerHTML = `
          <div class="visual-header">
            <div>
              <div class="eyebrow">${escapeHtml(analysis.category)}</div>
              <h2 class="visual-title">${escapeHtml(analysis.title)}</h2>
              <p class="meta">${escapeHtml(analysis.description)}</p>
            </div>
            <div>${analysis.is_latest ? '<span class="badge">latest</span>' : ""}</div>
          </div>
          <div class="meta">
            Stats run ${escapeHtml(analysis.run_id)} | Ingestion run ${escapeHtml(analysis.manifest_run_id)} |
            n=${escapeHtml(analysis.metadata?.n ?? "NA")} | ${escapeHtml(formatDate(analysis.run_datetime))}
          </div>
          ${renderVisualization(analysis)}
          ${renderNotes(analysis)}
        `;
      }

      function renderVisualization(analysis) {
        const visualization = analysis.visualization ?? {};
        if (visualization.type === "multi") {
          return (visualization.panels ?? []).map((panel) => renderPanel(panel, analysis.data)).join("");
        }
        return renderPanel(visualization, analysis.data);
      }

      function renderPanel(panel, data) {
        if (panel.type === "scalar_cards") return renderScalarCards(panel.config?.cards ?? [], data);
        if (panel.type === "table") return renderTable(panel.config?.columns ?? [], data.contributor_rows ?? data.rows ?? []);
        if (panel.type === "bar") return renderBarChart(panel.config ?? {}, data.rows ?? []);
        if (panel.type === "histogram") return renderHistogram(panel.config ?? {}, data.values ?? []);
        return `<pre>${escapeHtml(JSON.stringify({ visualization: panel, data }, null, 2))}</pre>`;
      }

      function renderScalarCards(cards, data) {
        return `
          <div class="cards">
            ${cards
              .map((card) => `
                <div class="card">
                  <div class="metric-label">${escapeHtml(card.label)}</div>
                  <div class="card-value">${escapeHtml(formatValue(data[card.value_field], card.format, card.unit))}</div>
                </div>
              `)
              .join("")}
          </div>
        `;
      }

      function renderTable(columns, rows) {
        if (!rows.length) return '<div class="empty">No table rows available.</div>';
        return `
          <table>
            <thead>
              <tr>${columns.map((column) => `<th>${escapeHtml(column.label || column.field)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${rows
                .map((row) => `
                  <tr>
                    ${columns.map((column) => `<td>${escapeHtml(formatValue(row[column.field], column.format))}</td>`).join("")}
                  </tr>
                `)
                .join("")}
            </tbody>
          </table>
        `;
      }

      function renderBarChart(config, rows) {
        if (!rows.length) return '<div class="empty">No bar chart rows available.</div>';
        const xField = config.x_field ?? "label";
        const yField = config.y_field ?? "value";
        const maxValue = Math.max(...rows.map((row) => Number(row[yField]) || 0), 1);
        return `
          <div class="chart" aria-label="${escapeHtml(config.y_label || "Bar chart")}">
            ${rows
              .map((row) => {
                const value = Number(row[yField]) || 0;
                const width = `${Math.max((value / maxValue) * 100, 2)}%`;
                return `
                  <div class="bar-row">
                    <div>${escapeHtml(row[xField] ?? "Unknown")}</div>
                    <div class="bar-track"><div class="bar-fill" style="--value:${width}"></div></div>
                    <strong>${escapeHtml(value)}</strong>
                  </div>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function renderHistogram(config, values) {
        if (!values.length) return '<div class="empty">No histogram values available.</div>';
        const binCount = Math.max(Number(config.bin_count) || 12, 1);
        const min = Math.min(...values);
        const max = Math.max(...values);
        const width = Math.max((max - min) / binCount, 1);
        const bins = Array.from({ length: binCount }, (_, index) => ({
          start: min + index * width,
          end: index === binCount - 1 ? max : min + (index + 1) * width,
          count: 0,
        }));
        for (const value of values) {
          const index = Math.min(Math.floor((value - min) / width), binCount - 1);
          bins[index].count += 1;
        }
        const maxCount = Math.max(...bins.map((bin) => bin.count), 1);
        return `
          <div>
            <div class="histogram" aria-label="${escapeHtml(config.x_label || "Histogram")}">
              ${bins
                .map((bin) => {
                  const height = `${Math.max((bin.count / maxCount) * 100, 2)}%`;
                  const label = `${Math.round(bin.start)}-${Math.round(bin.end)}: ${bin.count}`;
                  return `<div class="hist-bin" style="--value:${height}" data-label="${escapeHtml(label)}"></div>`;
                })
                .join("")}
            </div>
            <div class="meta">${escapeHtml(config.x_label || "")}</div>
          </div>
        `;
      }

      function renderNotes(analysis) {
        const notes = [analysis.metadata?.exclusions, analysis.metadata?.notes].filter(Boolean);
        if (!notes.length) return "";
        return `<div class="empty">${notes.map(escapeHtml).join("<br />")}</div>`;
      }

      function renderPipeline() {
        const pipeline = state.payload?.pipeline ?? [];
        els.pipelineCount.textContent = `${pipeline.length} ingestion lane${pipeline.length === 1 ? "" : "s"}`;
        if (!pipeline.length) {
          els.pipeline.innerHTML = '<div class="empty">No pipeline runs discovered yet.</div>';
          return;
        }
        els.pipeline.innerHTML = pipeline
          .map((lane) => `
            <div class="pipeline-row">
              <div class="pipeline-column">
                <div class="eyebrow">Ingestion</div>
                ${lane.ingestion ? renderPipelineNode(lane.ingestion, ["total_rows", "source_count"]) : '<div class="node">Missing ingestion manifest</div>'}
              </div>
              <div class="pipeline-arrow">→</div>
              <div class="pipeline-column">
                <div class="eyebrow">Stats Runs</div>
                ${lane.stats_runs.length ? lane.stats_runs.map((node) => renderPipelineNode(node, ["script_id", "n"])).join("") : '<div class="node">No stats artifacts</div>'}
              </div>
              <div class="pipeline-arrow">→</div>
              <div class="pipeline-column">
                <div class="eyebrow">Visualizations</div>
                ${lane.visualizations.length ? lane.visualizations.map((node) => renderPipelineNode(node, ["type", "script_id"])).join("") : '<div class="node">No visualizations generated</div>'}
              </div>
            </div>
          `)
          .join("");
      }

      function renderPipelineNode(node, fields) {
        const details = fields
          .map((field) => node[field] !== null && node[field] !== undefined ? `${field.replaceAll("_", " ")}: ${node[field]}` : null)
          .filter(Boolean)
          .join(" | ");
        return `
          <div class="node ${node.is_latest ? "latest" : ""}">
            <div class="artifact-title">
              <span>${escapeHtml(node.label)}</span>
              ${node.is_latest ? '<span class="badge gold">latest</span>' : ""}
            </div>
            <div class="meta">${escapeHtml(formatDate(node.run_datetime))}${details ? ` | ${escapeHtml(details)}` : ""}</div>
          </div>
        `;
      }

      function setTab(tab) {
        state.tab = tab;
        els.tabs.forEach((button) => button.classList.toggle("active", button.dataset.tab === tab));
        els.overviewView.classList.toggle("hidden", tab !== "overview");
        els.analysisView.classList.toggle("hidden", tab !== "analysis");
        els.analysisBrowser.classList.toggle("hidden", tab !== "analysis");
        els.pipelineView.classList.toggle("hidden", tab !== "runs");
      }

      function metricCard(label, value, detail) {
        return `
          <section class="panel metric">
            <div class="metric-label">${escapeHtml(label)}</div>
            <div class="metric-value">${escapeHtml(value)}</div>
            <div class="meta">${escapeHtml(detail)}</div>
          </section>
        `;
      }

      function uniqueValues(values) {
        return Array.from(new Set(values)).sort((a, b) => String(a).localeCompare(String(b)));
      }

      function option(value, label) {
        return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
      }

      els.categoryFilter.addEventListener("change", applyFilters);
      els.runFilter.addEventListener("change", applyFilters);
      els.analysisSelect.addEventListener("change", () => {
        state.selectedFilename = els.analysisSelect.value;
        renderArtifactList();
        renderSelectedAnalysis();
      });
      els.artifactList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-filename]");
        if (!button) return;
        state.selectedFilename = button.dataset.filename;
        els.analysisSelect.value = state.selectedFilename;
        renderArtifactList();
        renderSelectedAnalysis();
      });
      els.stageMap.addEventListener("click", (event) => {
        const button = event.target.closest("[data-stage-id]");
        if (!button) return;
        state.selectedStage = button.dataset.stageId;
        state.stageHistoryIndex = 0;
        renderStageOverview();
      });
      els.stageDetail.addEventListener("click", (event) => {
        const button = event.target.closest("[data-history-step]");
        if (!button) return;
        moveStageHistory(button.dataset.historyStep);
      });
      els.refresh.addEventListener("click", loadDashboard);
      els.tabs.forEach((button) => button.addEventListener("click", () => setTab(button.dataset.tab)));

      loadDashboard();
    </script>
  </body>
</html>
