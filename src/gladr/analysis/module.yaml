module_id: analysis
stage: analysis
purpose: Generate versioned analysis artifacts from the latest clean dataset.
owner_files:
  - base_script.py
  - runner.py
  - scripts/
contracts:
  inputs:
    - contracts/clean_dataset_schema.json
  outputs:
    - contracts/analysis_artifact_schema.json
    - contracts/visualization_schema.json
examples:
  - examples/clean_dataset_sample.json
  - examples/cohort_summary_artifact.json
  - examples/age_distribution_artifact.json
commands:
  run_all: python main.py analyze
  run_one: python main.py analyze --scripts cohort_summary
  test: python -B -m unittest discover -s tests
llm_rules:
  - Read this module README before adding or changing an analysis.
  - Add new stats as focused scripts under scripts/.
  - Keep artifacts compatible with contracts/analysis_artifact_schema.json.
  - Do not edit outputs/analysis manually.
